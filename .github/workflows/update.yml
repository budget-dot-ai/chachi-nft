name: Update Chachi Sun NFT

on:
  schedule:
    # Runs at minute 0 past every hour
    - cron: '0 * * * *'
  workflow_dispatch: # Allows you to click a button to run it manually!

permissions:
  contents: write # This gives the bot permission to save the new JSON files

env:
  # This silences the Node.js warning you saw earlier
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-metadata:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Run the update script
        run: python update_nft.py

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Force add all new or changed files
          git add -A
          
          # Commit the files, or gracefully skip if nothing changed
          git commit -m "🌱 Auto-update NFT metadata" || echo "No changes to commit"
          
          # Push the saved files back to your repository
          git push
